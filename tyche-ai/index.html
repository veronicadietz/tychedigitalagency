<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyche AI | Check Your Alignment Diagnostic</title>
<meta name="description" content="Talk to Tyche, the AI diagnostic partner from Tyche Digital Agency.">
<link rel="icon" href="https://assets.cdn.filesafe.space/erNBMEPHr5mwBKO660ir/media/695ea829a0a48408c7196071.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#F8F5F0;--ivory-dark:#F0EBE3;--navy:#0A1F44;
  --brown:#7C5C3B;--olive:#3E4D3A;--camel:#D1C4A7;
  --camel-mid:#B8A98A;--camel-light:#EDE5D4;
  --mid:#6B6156;--light:#9A9088;--border:rgba(184,169,138,0.4);
  --serif:'Playfair Display',Georgia,serif;
  --serif-b:'Libre Baskerville',Georgia,serif;
  --sans:'Raleway',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;display:flex;flex-direction:column;background:var(--navy)}

/* NAV */
.nav{
  flex-shrink:0;background:rgba(248,245,240,0.97);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  height:60px;display:flex;align-items:center;
  padding:0 5vw;justify-content:space-between;z-index:100;
}
.nav__logo img{height:34px;width:auto}
.nav__back{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s}
.nav__back:hover{color:var(--navy)}
.nav__cta{background:var(--navy);color:var(--ivory);padding:8px 18px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;transition:background .25s}
.nav__cta:hover{background:var(--olive);color:var(--ivory)}

/* IFRAME fills remaining height */
.chat-frame{
  flex:1;border:none;display:block;width:100%;
  background:var(--navy);
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/"><img src="https://assets.cdn.filesafe.space/erNBMEPHr5mwBKO660ir/media/693b11a65b7f645e8fd3a4ef.png" alt="Tyche Digital Agency" style="height:34px"></a>
  <a href="/alignment" class="nav__back">&#8592; Back to Alignment</a>
  <a href="/book" class="nav__cta">Free Strategy Call</a>
</nav>

<iframe
  class="chat-frame"
  src="https://claude.site/artifacts/6f7c1a2e-PLACEHOLDER/mobile"
  title="Tyche AI Diagnostic Chat"
  allow="clipboard-write"
  id="chatFrame"
></iframe>

</body>
</html>
